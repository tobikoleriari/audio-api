<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Audio Player</title>
  <style>
    body {
      background-color: #0a0a0a;
      color: #f0f0f0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .player {
      background-color: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 30px;
      width: 360px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #e8ff47;
      letter-spacing: 2px;
    }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #e8ff47;
      background-color: rgba(232, 255, 71, 0.04);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-zone p {
      font-size: 13px;
      color: #777;
      margin: 0;
    }

    .drop-zone p span { color: #e8ff47; }

    #trackName {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #timeDisplay {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 5px;
    }

    input[type="range"] {
      width: 100%;
      margin-bottom: 15px;
      accent-color: #e8ff47;
      cursor: pointer;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      background-color: #1a1a1a;
      color: #f0f0f0;
      border: 1px solid #333;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { border-color: #e8ff47; color: #e8ff47; }
    button.on    { background-color: #e8ff47; color: #000; border-color: #e8ff47; }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .row label {
      font-size: 13px;
      white-space: nowrap;
      min-width: 55px;
      text-align: left;
      color: #aaa;
    }

    .row input[type="range"] { margin-bottom: 0; }

    .row span {
      font-size: 12px;
      color: #aaa;
      min-width: 36px;
      text-align: right;
    }

    .row select {
      background-color: #1a1a1a;
      color: #f0f0f0;
      border: 1px solid #333;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .hints {
      margin-top: 18px;
      border-top: 1px solid #222;
      padding-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .hints span {
      font-size: 11px;
      color: #555;
    }

    .hints kbd {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e8ff47;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }
  </style>
</head>
<body>

<div class="player">
  <h2>AUDIO PLAYER</h2>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="audio/*" />
    <p>Drag & drop audio here or <span>click to browse</span></p>
  </div>

  <div id="trackName">No file loaded</div>
  <div id="timeDisplay">0:00 / 0:00</div>
  <input type="range" id="seekBar" value="0" min="0" step="0.1" />

  <div class="controls">
    <button id="btnSkipBack">« 10s</button>
    <button id="btnPlay">Play</button>
    <button id="btnSkipFwd">10s »</button>
    <button id="btnMute">Mute</button>
    <button id="btnLoop">Loop</button>
  </div>

  <div class="row">
    <label>Volume:</label>
    <input type="range" id="volSlider" min="0" max="1" step="0.01" value="1" />
    <span id="volPct">100%</span>
  </div>

  <div class="row">
    <label>Speed:</label>
    <select id="speedSelect">
      <option value="0.5">0.5x</option>
      <option value="0.75">0.75x</option>
      <option value="1" selected>1x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
  </div>

  <div class="hints">
    <span><kbd>Space</kbd> Play/Pause</span>
    <span><kbd>M</kbd> Mute</span>
    <span><kbd>L</kbd> Loop</span>
    <span><kbd>← →</kbd> Skip 10s</span>
    <span><kbd>↑ ↓</kbd> Volume</span>
  </div>
</div>

<audio id="audio"></audio>

<script>
  const audio       = document.getElementById('audio');
  const fileInput   = document.getElementById('fileInput');
  const dropZone    = document.getElementById('dropZone');
  const trackName   = document.getElementById('trackName');
  const btnPlay     = document.getElementById('btnPlay');
  const btnMute     = document.getElementById('btnMute');
  const btnLoop     = document.getElementById('btnLoop');
  const btnSkipBack = document.getElementById('btnSkipBack');
  const btnSkipFwd  = document.getElementById('btnSkipFwd');
  const seekBar     = document.getElementById('seekBar');
  const volSlider   = document.getElementById('volSlider');
  const volPct      = document.getElementById('volPct');
  const timeDisplay = document.getElementById('timeDisplay');
  const speedSelect = document.getElementById('speedSelect');

  function loadFile(file) {
    if (!file || !file.type.startsWith('audio/')) return;
    audio.src = URL.createObjectURL(file);
    audio.load();
    trackName.textContent = file.name;
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return m + ':' + sec;
  }

  function togglePlay() {
    if (audio.paused) {
      audio.play();
      btnPlay.textContent = 'Pause';
    } else {
      audio.pause();
      btnPlay.textContent = 'Play';
    }
  }

  function toggleMute() {
    audio.muted = !audio.muted;
    btnMute.textContent = audio.muted ? 'Unmute' : 'Mute';
    btnMute.classList.toggle('on', audio.muted);
  }

  function toggleLoop() {
    audio.loop = !audio.loop;
    btnLoop.textContent = audio.loop ? 'Loop: ON' : 'Loop';
    btnLoop.classList.toggle('on', audio.loop);
  }

  fileInput.addEventListener('change', function () { loadFile(fileInput.files[0]); });

  dropZone.addEventListener('dragover',  function (e) { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', function ()  { dropZone.classList.remove('dragover'); });
  dropZone.addEventListener('drop', function (e) {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    loadFile(e.dataTransfer.files[0]);
  });

  btnPlay.addEventListener('click', togglePlay);
  btnMute.addEventListener('click', toggleMute);
  btnLoop.addEventListener('click', toggleLoop);

  btnSkipBack.addEventListener('click', function () { audio.currentTime = Math.max(0, audio.currentTime - 10); });
  btnSkipFwd.addEventListener('click',  function () { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); });

  audio.addEventListener('ended', function () { btnPlay.textContent = 'Play'; });

  audio.addEventListener('loadedmetadata', function () { seekBar.max = audio.duration; });

  audio.addEventListener('timeupdate', function () {
    if (!isNaN(audio.duration)) {
      seekBar.value = audio.currentTime;
      timeDisplay.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
    }
  });

  seekBar.addEventListener('input', function () { audio.currentTime = seekBar.value; });

  volSlider.addEventListener('input', function () {
    audio.volume = volSlider.value;
    volPct.textContent = Math.round(volSlider.value * 100) + '%';
  });

  speedSelect.addEventListener('change', function () { audio.playbackRate = parseFloat(speedSelect.value); });

  document.addEventListener('keydown', function (e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

    switch (e.code) {
      case 'Space':      e.preventDefault(); togglePlay(); break;
      case 'KeyM':       toggleMute(); break;
      case 'KeyL':       toggleLoop(); break;
      case 'ArrowLeft':  e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 10); break;
      case 'ArrowRight': e.preventDefault(); audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); break;
      case 'ArrowUp':
        e.preventDefault();
        volSlider.value = Math.min(1, +volSlider.value + 0.05);
        volSlider.dispatchEvent(new Event('input'));
        break;
      case 'ArrowDown':
        e.preventDefault();
        volSlider.value = Math.max(0, +volSlider.value - 0.05);
        volSlider.dispatchEvent(new Event('input'));
        break;
    }
  });
</script>

</body>
</html>
